name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared (API resolves compiled types from dist)
        run: pnpm --filter @cravyr/shared build

      - name: Typecheck shared
        run: pnpm --filter @cravyr/shared typecheck

      - name: Typecheck API
        run: pnpm --filter cravyr-api typecheck

      - name: Build API
        run: pnpm --filter cravyr-api build

      - name: Run tests
        run: pnpm test
        continue-on-error: true
