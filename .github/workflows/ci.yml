name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # pnpm version comes from the packageManager field in package.json —
      # setting `version:` here too makes action-setup@v4 error out
      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared (other packages resolve compiled types from dist)
        run: pnpm --filter @cravyr/shared build

      - name: Typecheck shared
        run: pnpm --filter @cravyr/shared typecheck

      - name: Typecheck API
        run: pnpm --filter cravyr-api typecheck

      - name: Typecheck mobile
        run: pnpm --filter cravyr-mobile typecheck

      - name: Build API
        run: pnpm --filter cravyr-api build

      - name: Run tests
        run: pnpm test
