name: Supabase Keep-Alive

on:
  schedule:
    # Run every 3 days at 9:00 AM UTC to prevent Supabase free-tier 7-day auto-pause
    - cron: '0 9 */3 * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Query a real table so the request counts as database activity for the
          # free-tier auto-pause policy. The /rest/v1/ root (OpenAPI introspection)
          # now returns 401 regardless of auth and never touched the DB anyway.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/restaurants?select=id&limit=1")
          echo "Supabase responded with HTTP ${HTTP_STATUS}"
          if [ "${HTTP_STATUS}" -ne 200 ]; then
            echo "ERROR: Supabase ping failed with status ${HTTP_STATUS}"
            exit 1
          fi
          echo "Supabase keep-alive ping successful"

      - name: Check database size
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Guards against Pitfall 8: the free-tier 500MB cap silently flips the DB to
          # read-only mode. Fail loudly (GitHub failure email) as usage approaches it.
          # Threshold: 400 MiB = 419430400 bytes (~80% of the 500MB limit).
          THRESHOLD=419430400
          SIZE=$(curl -s -X POST \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${SUPABASE_URL}/rest/v1/rpc/database_size_bytes")
          # The RPC returns a bare integer. If it is not numeric, the migration
          # (20260702000000_database_size_rpc.sql) has not been applied to remote yet
          # (human action via `supabase db push`). Warn but do not fail the keep-alive.
          case "${SIZE}" in
            ''|*[!0-9]*)
              echo "WARNING: database_size_bytes RPC returned non-numeric value: '${SIZE}'"
              echo "The RPC migration may not be applied to remote yet (supabase db push). Skipping size check."
              exit 0
              ;;
          esac
          SIZE_MB=$((SIZE / 1048576))
          echo "Database size: ${SIZE} bytes (~${SIZE_MB} MB)"
          if [ "${SIZE}" -gt "${THRESHOLD}" ]; then
            echo "ERROR: Database size ~${SIZE_MB} MB is approaching the 500MB free-tier limit."
            echo "At 500MB Supabase silently switches to read-only mode (Pitfall 8). Archive old data or upgrade to Pro."
            exit 1
          fi
          echo "Database size check passed (under 400MiB threshold)."
