services:
  - type: web
    name: cravyr-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
