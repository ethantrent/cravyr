# Same as repo-root ../../render.yaml — kept for docs that reference apps/api/render.yaml.
# Prefer connecting the Blueprint to the root render.yaml in the Render dashboard.
# FREE TIER ONLY — plan: free, numInstances: 1 (do not add paid add-ons in this file).
services:
  - type: web
    name: cravyr-api
    runtime: node
    plan: free
    region: oregon
    numInstances: 1
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @cravyr/shared build && pnpm --filter cravyr-api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CRON_SEND_HOUR
        value: "23"
